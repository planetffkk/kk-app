<br>

<div class="container">
    <div class="row">

      <div *ngFor="let product of products; let productId = index" class="col-sm">
          <a [routerLink]="[ productId ]">
            <div class="card">
              <img src="./assets/img/79140332-4DC8-4ECF-A150-231AB7C9ED77_1_105_c.jpeg" class="card-img-top" alt="...">
              <div class="card-body">
                <h5 class="card-title">{{ product.name }}</h5>
                <p class="card-text">{{ product.description }}</p>
              </div>
            </div>
          </a>
      </div>
    </div>
</div>
